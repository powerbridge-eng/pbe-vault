<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBE Command Center - Pro Photoshop Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --ps-bg: #111; --ps-ui: #2d2d2d; --ps-accent: #3e3e3e; --gold: #ffc107; }
        body { background-color: var(--ps-bg); color: #ccc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Left Photoshop Toolbar */
        .ps-toolbar { width: 55px; background: var(--ps-ui); border-right: 1px solid #000; display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 8px; z-index: 10; overflow-y: auto; }
        .ps-toolbar::-webkit-scrollbar { width: 0px; }
        .tool { width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 3px; border: 1px solid transparent; color: #fff; font-size: 16px; }
        .tool:hover { background: var(--ps-accent); border: 1px solid #555; }
        .tool.active { background: #333; border: 1px solid var(--gold); }
        .tool-divider { width: 25px; height: 1px; background: #444; margin: 4px 0; }

        /* Workspace Canvas Area */
        .ps-workspace { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #0c0c0c; }
        .canvas-container { box-shadow: 0 0 60px rgba(0,0,0,1); border: 1px solid #333; transform: scale(0.9); }

        /* Right Inspector Panel */
        .ps-sidebar { width: 300px; background: var(--ps-ui); border-left: 1px solid #000; display: flex; flex-direction: column; }
        .ps-panel { padding: 15px; border-bottom: 1px solid #111; }
        .ps-panel h4 { font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 15px; letter-spacing: 2px; }
        
        label { font-size: 10px; color: var(--gold); display: block; margin-bottom: 6px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--gold); background: #444; height: 3px; border-radius: 2px; cursor: pointer; }
        
        .btn-execute { background: #28a745; color: white; border: none; padding: 15px; margin: 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .btn-execute:hover { background: #218838; transform: scale(1.02); }
        
        .ps-status-bar { position: absolute; bottom: 0; left: 55px; right: 300px; height: 25px; background: #1a1a1a; font-size: 10px; display: flex; align-items: center; padding: 0 15px; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="ps-toolbar">
        <div class="tool active" title="Move">🖱️</div>
        <div class="tool" title="Selection">🔲</div>
        <div class="tool" title="Lasso">➰</div>
        <div class="tool" title="Magic Wand">🪄</div>
        <div class="tool-divider"></div>
        <div class="tool" title="Crop">📐</div>
        <div class="tool" title="Eyedropper">🧪</div>
        <div class="tool" title="Eraser">🧽</div>
        <div class="tool-divider"></div>
        <div class="tool" title="Text (T)">T</div>
        <div class="tool" title="Pen">✒️</div>
        <div class="tool" title="Hand">🖐️</div>
        <div class="tool" title="Zoom">🔍</div>
        <div class="tool-divider"></div>
        <div class="tool" title="Nudge Up" onclick="nudge('up')">▲</div>
        <div class="tool" title="Nudge Down" onclick="nudge('down')">▼</div>
    </div>

    <div class="ps-workspace">
        <div class="canvas-container">
            <canvas id="psCanvas" width="1012" height="638"></canvas>
        </div>
        <div class="ps-status-bar">PBE COMMAND CENTER | 100% | RGB/8 | PERSONNEL: {{ w[2] }} {{ w[1] }}</div>
    </div>

    <div class="ps-sidebar">
        <div class="ps-panel">
            <h4>Character Adjustments</h4>
            <label>3D Shadow Depth</label>
            <input type="range" id="textDepth" min="0" max="15" value="4" oninput="refreshFx()">
            <label style="margin-top:12px;">Metallic Font Size</label>
            <input type="range" id="textSize" min="15" max="60" value="38" oninput="refreshFx()">
        </div>

        <div class="ps-panel">
            <h4>Layers & Blending</h4>
            <label>Photo Opacity</label>
            <input type="range" id="layerOpacity" min="0.1" max="1" step="0.05" value="1" oninput="refreshFx()">
            <label style="margin-top:12px;">Feathering (Soft Edge)</label>
            <input type="range" id="layerBlur" min="0" max="10" value="0" oninput="refreshFx()">
        </div>

        <div class="ps-panel">
            <h4>Sovereignty Automation</h4>
            <div style="background:#1a1a1a; padding:10px; border-radius:4px; border:1px solid #444;">
                <input type="checkbox" id="blueprintLock" checked> 
                <label style="display:inline; color:#fff; font-size:9px;">SAVE AS MASTER BLUEPRINT</label>
                <p style="font-size:8px; color:#555; margin:5px 0 0 18px;">Automates next print with these exact coordinates.</p>
            </div>
        </div>

        <button class="btn-execute" onclick="executePrint()">Lock & Execute Final Print</button>
    </div>

    <script>
        const canvas = new fabric.Canvas('psCanvas');
        let personnelPhoto, pbeName;

        // Initialize Background Template
        fabric.Image.fromURL('/static/template.png', function(bg) {
            bg.set({ selectable: false, evented: false });
            canvas.add(bg);
            canvas.sendToBack(bg);
            setupLayers();
        });

        function setupLayers() {
            // Live Data Text Layer
            pbeName = new fabric.IText("{{ w[2] }} {{ w[1] }}", {
                left: 260, top: 175,
                fontFamily: 'Arial Black',
                fontSize: 38,
                fill: '#C59B27',
                fontWeight: 'bold',
                editable: true
            });

            // Live Personnel Photo (Cloudinary)
            fabric.Image.fromURL("{{ w[13] }}", function(img) {
                personnelPhoto = img;
                img.scaleToWidth(280);
                img.set({ left: 650, top: 130 });
                canvas.add(img);
                canvas.setActiveObject(img);
                refreshFx();
            }, { crossOrigin: 'anonymous' });

            canvas.add(pbeName);
        }

        function refreshFx() {
            const depth = document.getElementById('textDepth').value;
            pbeName.set('shadow', new fabric.Shadow({
                color: 'rgba(0,0,0,0.9)', blur: 2, offsetX: depth, offsetY: depth
            }));
            pbeName.set('fontSize', parseInt(document.getElementById('textSize').value));
            
            if(personnelPhoto) {
                personnelPhoto.set('opacity', parseFloat(document.getElementById('layerOpacity').value));
            }
            canvas.renderAll();
        }

        function nudge(dir) {
            let active = canvas.getActiveObject();
            if(!active) return;
            if(dir === 'up') active.top -= 2;
            if(dir === 'down') active.top += 2;
            canvas.renderAll();
        }

        function executePrint() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
            const blueprint = {
                name_pos: {x: pbeName.left, y: pbeName.top},
                photo_pos: {x: personnelPhoto.left, y: personnelPhoto.top},
                fx: {depth: document.getElementById('textDepth').value, size: document.getElementById('textSize').value},
                locked: document.getElementById('blueprintLock').checked
            };

            fetch('/process-visual-print', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL, uid: "{{ w[6] }}", blueprint: blueprint })
            }).then(res => res.json()).then(data => {
                if(data.status === "success") window.location.href = data.redirect;
            });
        }
    </script>
</body>
</html>
